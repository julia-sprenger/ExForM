name: Total Cross Section Dataset
description: Submit or update a dataset for total, elastic, or non-elastic neutron cross sections
title: "[Total XS] <projectile> + <target> → <reaction>"
labels: ["nuclear-data", "cross-sections", "total-xs"]

body:
  - type: markdown
    attributes:
      value: |
        ## Total Cross Sections
        Please provide all information required to define one dataset.

  - type: input
    id: projectile
    attributes:
      label: Projectile
      description: Incident particle (e.g., n, p, d, α)
      placeholder: "n"
    validations:
      required: true

  - type: input
    id: target
    attributes:
      label: Target Nucleus
      description: Nuclide in standard notation
      placeholder: "56Fe"
    validations:
      required: true

  - type: dropdown
    id: reaction
    attributes:
      label: Reaction Type
      description: Select the total/elastic/inelastic channel
      options:
        - "(n,tot)"
        - "(n,el)"
        - "(n,inel)"
    validations:
      required: true

  - type: textarea
    id: incident_energies
    attributes:
      label: Incident Energies
      description: |
        List one or more incident energies **with uncertainties**.
        Format example:
        ```
        1.0 eV ± 0.01 eV
        14.1 MeV ± 0.1 MeV
        ```
    validations:
      required: true

  - type: textarea
    id: cross_sections
    attributes:
      label: Cross Sections
      description: |
        Provide cross section values **with uncertainties**, aligned with the incident energies.
        Format example:
        ```
        2.3 b ± 0.05 b
        3.1 b ± 0.1 b
        ```
    validations:
      required: true

  - type: textarea
    id: metadata
    attributes:
      label: Additional Metadata
      description: |
        Add experimental conditions, references/DOIs, facility, detector setup, normalization/corrections,
        covariance notes, data provenance, and any other relevant details.
      placeholder: "Facility, beam characteristics, detector, background subtraction, normalization, reference..."
    validations:
      required: false
